<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Dawilly Gene — Software Engineer & Full-Stack Developer</title>
    <style>
         :root {
            --dark-bg: #0a0a0f;
            --primary: #2563eb;
            --secondary: #38bdf8;
            --accent1: #818cf8;
            --accent2: #a78bfa;
            --accent3: #34d399;
            --accent4: #fbbf24;
            --accent5: #f43f5e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        ::selection {
            background: rgba(56, 189, 248, 0.2);
            color: #fff;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0f;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,.2);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        /* Navigation — handled by component CSS */
        
        nav {
            background-color: transparent;
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            z-index: 100;
            transition: all 0.3s ease;
        }
        
        nav.scrolled {
            background-color: rgba(10, 10, 15, 0.78);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }
        /* ── Fade-in animation (used by App.jsx IntersectionObserver) ── */

        .fade-in {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.7s cubic-bezier(.22,1,.36,1), transform 0.7s cubic-bezier(.22,1,.36,1);
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Mobile container tweak ── */

        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
